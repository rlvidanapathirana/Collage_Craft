<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CollageCraft Pro – Free Collage & Photo Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════
   TOKENS — Dark default, Light alt
════════════════════════════════════════════ */
:root{
  --font-d:'Plus Jakarta Sans',sans-serif;
  --font-b:'Inter',sans-serif;
  --r1:8px; --r2:14px; --r3:20px; --r4:28px;
  --ease:cubic-bezier(.4,0,.2,1);
  --t:200ms;
  --accent:#7C7AFF;
  --accent-h:#9492FF;
  --accent-s:rgba(124,122,255,.16);
  --accent-g:rgba(124,122,255,.30);
  --red:#FB7171;
  --red-s:rgba(251,113,113,.12);
  --green:#34D399;
}
/* DARK (default) */
html{
  --ink:#F1F2F6;
  --ink2:#C7CAD9;
  --muted:#8B8FA3;
  --border:#2A2D3D;
  --border-soft:#23263333;
  --surface:#0E0F17;
  --panel:#15171F;
  --panel2:#1B1E29;
  --white:#1B1E29;
  --sheet:rgba(21,23,31,.92);
  --board-default:#1B1E29;
  --slot-empty-bg:#1E212C;
  --shadow-soft:0 12px 40px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.04);
  --shadow-lg:0 24px 64px rgba(0,0,0,.55);
  color-scheme: dark;
}
html.light{
  --ink:#0F172A;
  --ink2:#334155;
  --muted:#64748B;
  --border:#E2E8F0;
  --border-soft:#E2E8F033;
  --surface:#F4F5F9;
  --panel:#FFFFFF;
  --panel2:#F8FAFC;
  --white:#FFFFFF;
  --sheet:rgba(255,255,255,.92);
  --board-default:#FFFFFF;
  --slot-empty-bg:#F1F5F9;
  --shadow-soft:0 12px 40px rgba(15,23,42,.08),0 0 0 1px rgba(15,23,42,.05);
  --shadow-lg:0 24px 64px rgba(0,0,0,.18);
  color-scheme: light;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;height:100%}
body{
  font-family:var(--font-b);background:var(--surface);color:var(--ink);
  height:100%;overflow:hidden;display:flex;flex-direction:column;
  transition:background var(--t) var(--ease),color var(--t) var(--ease);
}
button{cursor:pointer;border:none;outline:none;font-family:var(--font-b);background:none;color:inherit;-webkit-tap-highlight-color:transparent}
input{font-family:var(--font-b);color:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{display:none}
svg{display:block}

/* ════════════════════════════════════════════
   TOPBAR (desktop)
════════════════════════════════════════════ */
.topbar{
  height:60px;flex-shrink:0;
  display:flex;align-items:center;gap:12px;
  background:var(--sheet);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:0 18px;z-index:100;position:relative;
}
.logo{
  font-family:var(--font-d);font-weight:800;font-size:1.15rem;
  letter-spacing:-.03em;color:var(--ink);
  display:flex;align-items:center;gap:8px;margin-right:8px;flex-shrink:0;
}
.logo-gem{
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg,var(--accent),#B85CF6);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;color:white;
  box-shadow:0 2px 10px var(--accent-g);
}
.logo em{color:var(--accent);font-style:normal}
.topbar-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.scroll-container{display:flex;align-items:center;gap:6px;overflow-x:auto;scroll-behavior:smooth;padding:4px 0}

.size-chip{
  height:32px;padding:0 13px;border-radius:100px;
  font-size:.72rem;font-weight:600;font-family:var(--font-d);
  color:var(--muted);background:var(--panel2);border:1px solid var(--border);
  transition:all var(--t) var(--ease);white-space:nowrap;
}
.size-chip:hover{color:var(--ink);border-color:var(--muted)}
.size-chip.on{color:var(--accent);border-color:var(--accent);background:var(--accent-s)}

.grid-builder{display:flex;align-items:center;gap:9px}
.gb-label{font-size:.72rem;font-weight:600;color:var(--ink2);white-space:nowrap}
.stepper{display:flex;align-items:center;border:1px solid var(--border);border-radius:var(--r1);overflow:hidden;background:var(--panel2)}
.stepper button{width:28px;height:28px;font-size:17px;font-weight:500;color:var(--muted);transition:all var(--t) var(--ease);display:flex;align-items:center;justify-content:center}
.stepper button:hover{background:var(--border);color:var(--ink)}
.stepper span{min-width:26px;text-align:center;font-family:var(--font-d);font-size:.78rem;font-weight:700;color:var(--ink);border-left:1px solid var(--border);border-right:1px solid var(--border);line-height:28px}

.preset-bar{display:flex;align-items:center;gap:8px}
.preset-dot-wrap{position:relative}
.preset-dot{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all var(--t) var(--ease);outline:none}
.preset-dot:hover{transform:scale(1.15)}
.preset-dot.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--panel),0 0 0 4px var(--ink)}
.preset-tooltip{position:absolute;bottom:calc(100% + 9px);left:50%;transform:translateX(-50%) translateY(5px);background:var(--ink);color:var(--surface);font-size:.62rem;font-weight:700;font-family:var(--font-d);padding:4px 9px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:all var(--t) var(--ease);z-index:50}
.preset-dot-wrap:hover .preset-tooltip{opacity:1;transform:translateX(-50%) translateY(0)}

.gap-ctl{display:flex;align-items:center;gap:8px}
.topbar-space{flex:1}
.top-actions{display:flex;align-items:center;gap:8px}

.icon-btn{
  width:36px;height:36px;border-radius:var(--r1);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);background:var(--panel2);border:1px solid var(--border);
  transition:all var(--t) var(--ease);flex-shrink:0;
}
.icon-btn:hover{color:var(--ink);background:var(--border)}
.icon-btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.icon-btn.on{color:var(--accent);border-color:var(--accent);background:var(--accent-s)}

.btn-ghost{height:36px;padding:0 15px;border-radius:var(--r1);font-size:.78rem;font-weight:600;font-family:var(--font-d);color:var(--muted);background:var(--panel2);border:1px solid var(--border);transition:all var(--t) var(--ease)}
.btn-ghost:hover{background:var(--border);color:var(--ink)}
.btn-export{
  height:36px;padding:0 18px;border-radius:var(--r1);
  font-size:.78rem;font-weight:700;font-family:var(--font-d);
  color:#fff;background:var(--accent);
  display:flex;align-items:center;gap:7px;
  transition:all var(--t) var(--ease);box-shadow:0 2px 12px var(--accent-g);
}
.btn-export:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-export:active{transform:translateY(0)}

/* ════════════════════════════════════════════
   WORKSPACE / BOARD
════════════════════════════════════════════ */
.workspace{
  flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;
  background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);
  background-size:26px 26px;padding:40px;position:relative;
}
.board{
  background:var(--board-default);
  box-shadow:var(--shadow-soft);border-radius:8px;flex-shrink:0;
  display:grid;position:relative;overflow:hidden;
  transition:width .3s ease,height .3s ease,gap .3s ease,background .25s ease;
}
.slot{position:relative;overflow:hidden;cursor:pointer;background:var(--slot-empty-bg);transition:background var(--t) var(--ease)}
.slot-inner{width:100%;height:100%;position:relative;overflow:hidden}
.slot img{position:absolute;pointer-events:none;user-select:none;-webkit-user-drag:none}
.slot-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;pointer-events:none;transition:opacity var(--t) var(--ease)}
.slot-empty-icon{width:44px;height:44px;border-radius:50%;background:var(--panel);box-shadow:0 4px 12px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all var(--t) var(--ease)}
.slot-empty-text{font-size:.7rem;font-weight:600;color:var(--muted);font-family:var(--font-d)}
.slot::after{content:'';position:absolute;inset:0;border:0px solid var(--accent);pointer-events:none;transition:all var(--t) var(--ease);z-index:10}
.slot:hover .slot-empty-icon{transform:scale(1.08);color:var(--accent)}
.slot.selected::after{border-width:3px;border-color:var(--accent);border-style:solid}
.slot.selected .slot-inner{cursor:grab}
.slot.selected.dragging .slot-inner{cursor:grabbing}

.pan-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%) translateY(8px);background:rgba(0,0,0,.75);color:#fff;font-size:.62rem;font-family:var(--font-d);padding:4px 9px;border-radius:100px;opacity:0;pointer-events:none;transition:all var(--t) var(--ease);z-index:15;display:flex;gap:4px;align-items:center;white-space:nowrap}
.slot.selected:not(.dragging):hover .pan-hint{opacity:1;transform:translateX(-50%) translateY(0)}

/* text & sticker layers sit above the grid */
.layer{
  position:absolute;cursor:grab;user-select:none;-webkit-user-drag:none;
  touch-action:none;z-index:200;
}
.layer.dragging{cursor:grabbing;z-index:300}
.layer.selected{outline:2px dashed var(--accent);outline-offset:4px}
.layer-text{font-family:var(--font-d);white-space:nowrap;font-weight:700}
.layer-del{
  position:absolute;top:-12px;right:-12px;width:24px;height:24px;border-radius:50%;
  background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.3);z-index:310;
}
.layer-resize{
  position:absolute;bottom:-10px;right:-10px;width:20px;height:20px;border-radius:50%;
  background:var(--accent);border:2px solid #fff;cursor:nwse-resize;z-index:310;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}

/* ════════════════════════════════════════════
   FLOATING SLOT TOOLBAR (desktop popover)
════════════════════════════════════════════ */
#slot-toolbar{
  position:fixed;display:none;background:var(--sheet);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--border);border-radius:var(--r3);
  box-shadow:var(--shadow-lg);padding:18px;z-index:500;min-width:280px;
  transform:translateY(10px);opacity:0;transition:opacity .2s,transform .2s;
  max-height:80vh;overflow-y:auto;
}
#slot-toolbar.visible{display:block;opacity:1;transform:translateY(0)}
.stb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stb-title{font-size:.82rem;font-weight:700;font-family:var(--font-d);color:var(--ink)}
.stb-close{width:26px;height:26px;border-radius:8px;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;background:var(--panel2);transition:all var(--t) var(--ease)}
.stb-close:hover{background:var(--border);color:var(--ink)}
.stb-row{margin-bottom:12px}
.stb-label{font-size:.66rem;font-weight:700;font-family:var(--font-d);color:var(--muted);text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;letter-spacing:.02em}
.stb-label span{color:var(--accent);font-size:.72rem;background:var(--accent-s);padding:2px 6px;border-radius:4px}
.stb-slider{width:100%;height:5px;border-radius:3px;background:var(--border);-webkit-appearance:none;appearance:none;cursor:pointer}
.stb-slider::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--accent);box-shadow:0 2px 6px var(--accent-g);cursor:pointer;transition:transform .1s}
.stb-slider::-webkit-slider-thumb:hover{transform:scale(1.15)}
.stb-actions{display:flex;gap:8px;margin-top:16px}
.stb-btn-clear{flex:1;height:34px;border-radius:var(--r1);font-size:.72rem;font-weight:600;font-family:var(--font-d);color:var(--red);background:var(--red-s);transition:all var(--t) var(--ease)}
.stb-btn-clear:hover{filter:brightness(1.15)}
.stb-btn-replace{flex:2;height:34px;border-radius:var(--r1);font-size:.72rem;font-weight:600;font-family:var(--font-d);color:var(--surface);background:var(--ink);transition:all var(--t) var(--ease)}
.stb-btn-replace:hover{opacity:.85}
.stb-grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stb-mini-btn{height:30px;border-radius:7px;font-size:.68rem;font-weight:600;font-family:var(--font-d);background:var(--panel2);color:var(--ink2);border:1px solid var(--border);transition:all var(--t) var(--ease);display:flex;align-items:center;justify-content:center;gap:5px}
.stb-mini-btn:hover{background:var(--border)}
.stb-mini-btn.on{color:var(--accent);border-color:var(--accent);background:var(--accent-s)}
.stb-tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:0}
.stb-tab{padding:7px 4px;font-size:.68rem;font-weight:700;font-family:var(--font-d);color:var(--muted);border-bottom:2px solid transparent;transition:all var(--t) var(--ease)}
.stb-tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.swatch-row{display:flex;gap:8px;flex-wrap:wrap}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid var(--border);transition:all var(--t) var(--ease);flex-shrink:0}
.swatch:hover{transform:scale(1.1)}
.swatch.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--panel),0 0 0 4px var(--accent)}
.swatch.add-custom{display:flex;align-items:center;justify-content:center;background:var(--panel2);color:var(--muted);font-size:14px;position:relative;overflow:hidden}
.swatch.add-custom input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ════════════════════════════════════════════
   MOBILE BOTTOM SHEET (CapCut-style)
════════════════════════════════════════════ */
.bottom-toolbar{display:none}
.sheet-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;
  opacity:0;pointer-events:none;transition:opacity var(--t) var(--ease);
}
.sheet-bg.open{opacity:1;pointer-events:all}
.bottom-sheet{
  position:fixed;left:0;right:0;bottom:0;background:var(--sheet);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  border-radius:18px 18px 0 0;z-index:401;
  transform:translateY(100%);transition:transform .28s var(--ease);
  max-height:62vh;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 4px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px}
.sheet-title{font-size:.85rem;font-weight:700;font-family:var(--font-d);color:var(--ink)}
.sheet-body{padding:4px 18px 18px;overflow-y:auto}

/* CapCut-style bottom icon dock */
.dock{
  display:none;
  flex-shrink:0;
  background:var(--sheet);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  padding:8px 4px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0));
  z-index:90;
}
.dock-scroll{display:flex;overflow-x:auto;gap:2px;padding:0 6px}
.dock-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  min-width:58px;padding:6px 4px;border-radius:10px;flex-shrink:0;
  color:var(--muted);transition:all var(--t) var(--ease);
}
.dock-item.on{color:var(--accent)}
.dock-item .di-icn{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.dock-item .di-lbl{font-size:.6rem;font-weight:600;font-family:var(--font-d);white-space:nowrap}

.mobile-topbar{display:none}

/* ════════════════════════════════════════════
   EXPORT MODAL
════════════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--t) var(--ease)}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--panel);border-radius:var(--r3);padding:28px;width:400px;max-width:92vw;box-shadow:var(--shadow-lg);transform:translateY(20px) scale(.95);transition:all var(--t) var(--ease);max-height:88vh;overflow-y:auto}
.modal-bg.open .modal{transform:translateY(0) scale(1)}
.modal h2{font-family:var(--font-d);font-size:1.3rem;font-weight:800;letter-spacing:-.02em;margin-bottom:8px;color:var(--ink)}
.modal p{font-size:.82rem;color:var(--muted);margin-bottom:20px;line-height:1.5}
.modal-fmts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.fmt-opt{border:2px solid var(--border);border-radius:var(--r2);padding:14px;text-align:center;cursor:pointer;transition:all var(--t) var(--ease);background:var(--panel2)}
.fmt-opt:hover{border-color:var(--accent-g)}
.fmt-opt.on{border-color:var(--accent);background:var(--accent-s)}
.fmt-icon{font-size:24px;margin-bottom:6px}
.fmt-name{font-family:var(--font-d);font-size:.82rem;font-weight:700;color:var(--ink)}
.fmt-sub{font-size:.66rem;color:var(--muted);margin-top:3px}
.modal-quality{margin-bottom:18px}
.modal-btns{display:flex;gap:10px}
.modal-cancel{flex:1;height:44px;border-radius:var(--r2);font-size:.82rem;font-weight:600;font-family:var(--font-d);background:var(--panel2);color:var(--muted);border:1px solid var(--border);transition:all var(--t) var(--ease)}
.modal-cancel:hover{color:var(--ink);background:var(--border)}
.modal-dl{flex:2;height:44px;border-radius:var(--r2);font-size:.82rem;font-weight:700;font-family:var(--font-d);background:var(--accent);color:#fff;transition:all var(--t) var(--ease);box-shadow:0 4px 14px var(--accent-g)}
.modal-dl:hover{background:var(--accent-h);transform:translateY(-2px)}

/* ════════════════════════════════════════════
   TOAST / ZOOM / CREDIT
════════════════════════════════════════════ */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:var(--surface);font-size:.82rem;font-weight:600;font-family:var(--font-d);padding:11px 22px;border-radius:100px;display:flex;align-items:center;gap:9px;box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:2000;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.zoom-pill{position:fixed;bottom:24px;right:24px;display:flex;align-items:center;gap:4px;background:var(--panel);border:1px solid var(--border);border-radius:100px;padding:6px;box-shadow:var(--shadow-soft);z-index:90}
.zoom-pill button{width:30px;height:30px;border-radius:100px;font-size:15px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all var(--t) var(--ease)}
.zoom-pill button:hover{background:var(--panel2);color:var(--ink)}
.zoom-pct{font-family:var(--font-d);font-size:.72rem;font-weight:700;color:var(--ink);padding:0 6px;min-width:44px;text-align:center}
.credit{position:fixed;bottom:24px;left:24px;font-size:.72rem;color:var(--muted);font-family:var(--font-d);font-weight:500;z-index:90}
.credit a{color:var(--accent);font-weight:700}
.credit a:hover{color:var(--accent-h)}
.slot.drag-over::after{border-width:3px;border-style:dashed}
.slot.drag-over .slot-empty-icon{transform:scale(1.2);background:var(--accent-s);color:var(--accent)}

/* sticker emoji grid */
.sticker-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.sticker-pick{font-size:24px;text-align:center;padding:8px 0;border-radius:9px;background:var(--panel2);transition:all var(--t) var(--ease)}
.sticker-pick:hover{background:var(--border);transform:scale(1.1)}

.text-input-row{display:flex;gap:8px;margin-bottom:12px}
.text-input-row input[type=text]{flex:1;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--panel2);color:var(--ink);padding:0 12px;font-size:.85rem}
.text-add-btn{height:38px;padding:0 16px;border-radius:9px;background:var(--accent);color:#fff;font-weight:700;font-size:.78rem;font-family:var(--font-d)}

/* layout templates */
.layout-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.layout-opt{
  aspect-ratio:1;border-radius:9px;border:1.5px solid var(--border);background:var(--panel2);
  padding:5px;display:grid;gap:2px;cursor:pointer;transition:all var(--t) var(--ease);
}
.layout-opt:hover{border-color:var(--accent-g)}
.layout-opt.on{border-color:var(--accent);background:var(--accent-s)}
.layout-opt div{background:var(--muted);opacity:.4;border-radius:2px}

/* shadow presets for slots */
.shadow-row{display:flex;gap:8px;flex-wrap:wrap}
.shadow-opt{width:48px;height:48px;border-radius:9px;background:var(--panel2);border:1.5px solid var(--border);cursor:pointer;transition:all var(--t) var(--ease);display:flex;align-items:center;justify-content:center}
.shadow-opt:hover{border-color:var(--accent-g)}
.shadow-opt.on{border-color:var(--accent)}
.shadow-opt .sw-demo{width:24px;height:24px;border-radius:5px;background:var(--ink2)}

/* loading spinner for export */
.spin{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ════════════════════════════════════════════
   MOBILE RESPONSIVE
════════════════════════════════════════════ */
@media(max-width:900px){
  .topbar{display:none}
  .mobile-topbar{
    display:flex;align-items:center;justify-content:space-between;
    height:54px;flex-shrink:0;padding:0 14px;
    background:var(--sheet);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border);z-index:100;
  }
  .mobile-topbar .logo{font-size:1rem;margin:0}
  .mobile-topbar .mt-actions{display:flex;gap:8px;align-items:center}

  .workspace{padding:16px;padding-bottom:24px}
  #slot-toolbar{display:none !important}

  .bottom-toolbar{display:block}
  .dock{display:block}

  .zoom-pill{bottom:14px;right:14px;padding:4px}
  .zoom-pill button{width:26px;height:26px}
  .credit{display:none}

  .layout-grid{grid-template-columns:repeat(4,1fr)}
  .sticker-grid{grid-template-columns:repeat(6,1fr)}
}
@media(min-width:901px){
  .dock{display:none !important}
  .bottom-sheet{display:none !important}
  .sheet-bg{display:none !important}
</style>

];

const STICKERS = ['❤️','⭐','🔥','✨','🎉','😍','👍','💯','🌸','☀️','🌙','💫','🎈','🎀','📸','💕','🌈','⚡','🦋','🍀','👑','💎','🎵','☕'];
const TEXT_FONTS = [
  {id:'jakarta', label:'Sans', css:"'Plus Jakarta Sans',sans-serif"},
  {id:'serif', label:'Serif', css:"Georgia,'Times New Roman',serif"},
  {id:'mono', label:'Mono', css:"'Courier New',monospace"},
  {id:'script', label:'Script', css:"cursive"},
];
const TEXT_COLORS = ['#FFFFFF','#0F172A','#7C7AFF','#FB7171','#34D399','#FCD34D','#F472B6'];
const BG_SWATCHES = ['#FFFFFF','#0A0A0C','#7C7AFF','#FB7171','#34D399','#FCD34D','#F472B6','#0EA5E9','#1E293B','#F4F1EA'];

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const S = {
  cols: 2, rows: 2,
  gap: 8,
  sizeId: 'sq',
  presetId: 'orig',
  zoomLevel: 0.75,
  exportFmt: 'png',
  exportScale: 1,
  selectedSlot: -1,
  slots: [],
  frameId: 'none',
  shadowId: 'none',
  boardBg: null,        // custom override color, else preset color used
  layers: [],           // text & sticker layers
  selectedLayer: -1,
  theme: 'dark',
};
let pendingSlotIdx = -1;
let layerIdCounter = 1;

/* ══════════════════════════════════════════
   UNDO / REDO (history of JSON-serializable state)
══════════════════════════════════════════ */
let history = [];
let historyIdx = -1;
let suppressHistory = false;

function snapshotState() {
  return JSON.stringify({
    cols:S.cols, rows:S.rows, gap:S.gap, sizeId:S.sizeId, presetId:S.presetId,
    frameId:S.frameId, shadowId:S.shadowId, boardBg:S.boardBg,
    slots: S.slots.map(sl => ({ dataURL:sl.dataURL, zoom:sl.zoom, br:sl.br, ct:sl.ct, sat:sl.sat, ox:sl.ox, oy:sl.oy, flipH:sl.flipH, flipV:sl.flipV, rot:sl.rot||0 })),
    layers: S.layers.map(l => ({...l})),
  });
}

function pushHistory() {
  if(suppressHistory) return;
  history = history.slice(0, historyIdx + 1);
  history.push(snapshotState());
  if(history.length > 40) history.shift();
  historyIdx = history.length - 1;
  updateUndoRedoButtons();
}

function restoreState(json) {
  const d = JSON.parse(json);
  suppressHistory = true;
  S.cols=d.cols; S.rows=d.rows; S.gap=d.gap; S.sizeId=d.sizeId; S.presetId=d.presetId;
  S.frameId=d.frameId||'none'; S.shadowId=d.shadowId||'none'; S.boardBg=d.boardBg||null;
  S.layers = (d.layers||[]).map(l=>({...l}));
  S.selectedLayer = -1;
  const newSlots = d.slots.map(sd => {
    const sl = { dataURL: sd.dataURL, img: null, zoom: sd.zoom, br: sd.br, ct: sd.ct, sat: sd.sat, ox: sd.ox, oy: sd.oy, flipH: sd.flipH||false, flipV: sd.flipV||false, rot: sd.rot||0 };
    if(sd.dataURL) {
      const im = new Image();
      im.src = sd.dataURL;
      sl.img = im;
    }
    return sl;
  });
  S.slots = newSlots;
  document.getElementById('cols-val').textContent = S.cols;
  document.getElementById('rows-val').textContent = S.rows;
  document.getElementById('gap-val').textContent = S.gap;
  document.querySelectorAll('.size-chip').forEach((x,i)=>x.classList.toggle('on', SIZES[i].id===S.sizeId));
  document.querySelectorAll('.preset-dot').forEach((x,i)=>x.classList.toggle('on', PRESETS[i].id===S.presetId));
  closeToolbar();
  applyBoard();
  renderLayers();
  suppressHistory = false;
}

function undo() {
  if(historyIdx <= 0) return;
  historyIdx--;
  restoreState(history[historyIdx]);
  updateUndoRedoButtons();
}
function redo() {
  if(historyIdx >= history.length - 1) return;
  historyIdx++;
  restoreState(history[historyIdx]);
  updateUndoRedoButtons();
}
function updateUndoRedoButtons() {
  const ub = document.getElementById('undo-btn'), rb = document.getElementById('redo-btn');
  const ubm = document.getElementById('undo-btn-m'), rbm = document.getElementById('redo-btn-m');
  const uDis = historyIdx <= 0, rDis = historyIdx >= history.length - 1;
  [ub,ubm].forEach(b=>{ if(b) b.disabled = uDis; });
  [rb,rbm].forEach(b=>{ if(b) b.disabled = rDis; });
}

  const icon = S.theme === 'dark' ? sun : moon;
  document.getElementById('theme-btn').innerHTML = icon;
  document.getElementById('theme-btn-m').innerHTML = icon;
}
function toggleTheme() {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.classList.toggle('light', S.theme === 'light');
  applyThemeIcon();
  // Refresh anything that reads CSS variables into inline styles
  applyBoard();
  toast(S.theme === 'dark' ? '🌙 Dark mode' : '☀️ Light mode');
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
function init() {
  applyThemeIcon();
  buildSizeChips();
  buildPresetBar();
  buildDock();
  rebuildGrid();
  fitZoom();
  initDrag();
  initLayerDrag();
  pushHistory();
}

function buildSizeChips() {
  const el = document.getElementById('size-chips');
  el.innerHTML = '';
  SIZES.forEach(sz => {
    const b = document.createElement('button');
    b.className = 'size-chip' + (sz.id === S.sizeId ? ' on' : '');
    b.textContent = sz.name;
    b.onclick = () => { S.sizeId = sz.id; document.querySelectorAll('.size-chip').forEach((x,i)=>x.classList.toggle('on',SIZES[i].id===sz.id)); applyBoard(); fitZoom(); pushHistory(); };
    el.appendChild(b);
  });
}

function buildPresetBar() {
  const el = document.getElementById('preset-bar');
  el.innerHTML = '';
  PRESETS.forEach(p => {
    const wrap = document.createElement('div');
    wrap.className = 'preset-dot-wrap';
    const b = document.createElement('button');
    b.className = 'preset-dot' + (p.id === S.presetId ? ' on' : '');
    b.style.background = PRESET_LIGHT_COLOR[p.id];
    b.style.boxShadow = `0 0 0 1.5px ${PRESET_BORDER[p.id]} inset`;
    b.setAttribute('aria-label', p.name);
    b.onclick = () => { S.presetId = p.id; document.querySelectorAll('.preset-dot').forEach((x,i)=>x.classList.toggle('on',PRESETS[i].id===p.id)); applyPreset(); pushHistory(); };
    const tip = document.createElement('div');
    tip.className = 'preset-tooltip';
    tip.textContent = p.name;
    wrap.appendChild(b); wrap.appendChild(tip);
    el.appendChild(wrap);
  });
}

/* ══════════════════════════════════════════
   GRID
══════════════════════════════════════════ */
function stepGrid(axis, delta) {
  if(axis==='cols') S.cols = Math.max(1, Math.min(6, S.cols+delta));
  else S.rows = Math.max(1, Math.min(6, S.rows+delta));
  document.getElementById('cols-val').textContent = S.cols;
  document.getElementById('rows-val').textContent = S.rows;
  rebuildGrid();
  pushHistory();
}

function stepGap(delta) {
  S.gap = Math.max(0, Math.min(40, S.gap+delta));
  document.getElementById('gap-val').textContent = S.gap;
  applyBoard();
  pushHistory();
}

function rebuildGrid() {
  const total = S.cols * S.rows;
  const old = S.slots.slice();
  S.slots = [];
  for(let i=0;i<total;i++) {
    S.slots.push(old[i] || { dataURL:null, img:null, zoom:1, br:100, ct:100, sat:100, ox:0, oy:0, flipH:false, flipV:false, rot:0 });
  }
  applyBoard();
}

/* Resolve the actual board background color, respecting custom override > preset color > default */
function resolveBoardBg() {
  if(S.boardBg) return S.boardBg;
  const preset = PRESETS.find(x=>x.id===S.presetId);
  if(preset && preset.color) return preset.color;
  return getComputedStyle(document.documentElement).getPropertyValue('--board-default').trim() || '#FFFFFF';
}

function applyBoard() {
  const board = document.getElementById('board');
  const sz = SIZES.find(x=>x.id===S.sizeId);
  const W = sz.w * S.zoomLevel;
  const H = sz.h * S.zoomLevel;
  board.style.width  = W + 'px';
  board.style.height = H + 'px';
  board.style.gridTemplateColumns = `repeat(${S.cols}, 1fr)`;
  board.style.gridTemplateRows    = `repeat(${S.rows}, 1fr)`;
  board.style.gap = (S.gap * S.zoomLevel) + 'px';
  board.style.background = resolveBoardBg();

  const slotBgVar = getComputedStyle(document.documentElement).getPropertyValue('--slot-empty-bg').trim();

  board.innerHTML = '';
  S.slots.forEach((sl, i) => {
    const div = document.createElement('div');
    div.className = 'slot' + (S.selectedSlot === i ? ' selected' : '');
    div.dataset.idx = i;

    const frame = FRAMES.find(x=>x.id===S.frameId);
    const shadow = SHADOWS.find(x=>x.id===S.shadowId);

    if(frame.border > 0) {
      div.style.border = `${Math.max(1,frame.border*S.zoomLevel)}px solid ${frame.color}`;
    } else {
      div.style.border = 'none';
    }
    if(frame.id === 'polaroid') {
      div.style.border = `${10*S.zoomLevel}px solid #fff`;
      div.style.borderBottom = `${34*S.zoomLevel}px solid #fff`;
    }
    div.style.borderRadius = (frame.radius * S.zoomLevel) + 'px';
    div.style.boxShadow = sl.img ? shadow.css : 'none';

    const inner = document.createElement('div');
    inner.className = 'slot-inner';
    inner.style.borderRadius = (Math.max(0,frame.radius - frame.border) * S.zoomLevel) + 'px';

    if(sl.img) {
      const imgEl = document.createElement('img');
      imgEl.src = sl.dataURL;
      imgEl.draggable = false;
      inner.appendChild(imgEl);
      applySlotTransform(sl, imgEl);

      const hint = document.createElement('div');
      hint.className = 'pan-hint';
      hint.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M19 9l3 3-3 3M9 19l3 3 3-3M2 12h20M12 2v20"/></svg> Drag to position';
      inner.appendChild(hint);
    } else {
      div.style.background = slotBgVar;
      const emp = document.createElement('div');
      emp.className = 'slot-empty';
      emp.innerHTML = `<div class="slot-empty-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div><div class="slot-empty-text">Tap to add</div>`;
      inner.appendChild(emp);
    }

    div.appendChild(inner);
    board.appendChild(div);

    div.addEventListener('click', (e) => {
      if(div.classList.contains('dragging')) return;
      onSlotClick(i);
    });
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => { e.preventDefault(); div.classList.remove('drag-over'); handleDrop(e, i); });
  });

  applyPreset();
  renderLayers();
}

/* ══════════════════════════════════════════
   DRAG AND PAN LOGIC (photo inside slot)
══════════════════════════════════════════ */
function initDrag() {
  let dragInfo = null;

  document.addEventListener('mousedown', dragStart);
  document.addEventListener('mousemove', dragMove);
  document.addEventListener('mouseup', dragEnd);
  document.addEventListener('touchstart', dragStart, {passive:false});
  document.addEventListener('touchmove', dragMove, {passive:false});
  document.addEventListener('touchend', dragEnd);

  function dragStart(e) {
    const slot = e.target.closest('.slot.selected');
    if(!slot) return;
    const idx = parseInt(slot.dataset.idx);
    if(S.selectedSlot === idx && S.slots[idx].img) {
      const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
      const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
      dragInfo = { id: idx, startX: clientX, startY: clientY, startOx: S.slots[idx].ox, startOy: S.slots[idx].oy };
    }
  }
  function dragMove(e) {
    if(!dragInfo) return;
    e.preventDefault();
    const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
    const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
    let dx = (clientX - dragInfo.startX) / S.zoomLevel;
    let dy = (clientY - dragInfo.startY) / S.zoomLevel;
    const sl = S.slots[dragInfo.id];
    if(sl.flipH) dx = -dx;
    if(sl.flipV) dy = -dy;
    sl.ox = dragInfo.startOx + dx;
    sl.oy = dragInfo.startOy + dy;
    const slot = document.querySelector(`.slot[data-idx="${dragInfo.id}"]`);
    if(slot) slot.classList.add('dragging');
    applySlotTransformLive(dragInfo.id);
  }
  function dragEnd() {
    if(dragInfo) {
      const slot = document.querySelector(`.slot[data-idx="${dragInfo.id}"]`);
      if(slot) setTimeout(() => slot.classList.remove('dragging'), 50);
      dragInfo = null;
      pushHistory();
    }
  }
}

/* ══════════════════════════════════════════
   SLOT CLICK & IMAGE UPLOAD
══════════════════════════════════════════ */
function onSlotClick(i) {
  const sl = S.slots[i];
  if(!sl.img) {
    openFilePickerForSlot(i);
  } else {
    if(window.innerWidth <= 900) { S.selectedSlot = i; applyBoard(); openSheet('adjust'); }
    else openToolbar(i);
  }
}

function openFilePickerForSlot(i) {
  pendingSlotIdx = i;
  const fi = document.getElementById('file-in');
  fi.value = '';
  fi.onchange = null;
  fi.onchange = e => {
    const f = e.target.files[0];
    if(f) loadImageIntoSlot(pendingSlotIdx, f);
  };
  fi.click();
}

function handleDrop(e, i) {
  const files = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(files[0]) loadImageIntoSlot(i, files[0]);
}

function loadImageIntoSlot(i, file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      S.slots[i] = { dataURL: ev.target.result, img, zoom:1, br:100, ct:100, sat:100, ox:0, oy:0, flipH:false, flipV:false, rot:0 };
      applyBoard();
      S.selectedSlot = i;
      applyBoard();
      if(window.innerWidth <= 900) openSheet('adjust');
      else openToolbar(i);
      toast('📸 Photo added — drag to position');
      pushHistory();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

/* ══════════════════════════════════════════
   SLOT TRANSFORM (Cover + Zoom + Pan + Flip)
   Fixed: filter chain no longer leaves a residual
   shaded backdrop — image always fully covers slot
   and any preset color only shows on EMPTY slots.
══════════════════════════════════════════ */
function buildSlotFilter(sl) {
  const preset = PRESETS.find(x=>x.id===S.presetId);
  const base = `brightness(${sl.br}%) contrast(${sl.ct}%) saturate(${sl.sat}%)`;
  return preset.filter ? base + ' ' + preset.filter : base;
}

function buildSlotTransform(sl) {
  const flipX = sl.flipH ? -1 : 1;
  const flipY = sl.flipV ? -1 : 1;
  const rot = sl.rot || 0;
  return `scale(${sl.zoom * flipX}, ${sl.zoom * flipY}) rotate(${rot}deg)`;
}

function applySlotTransform(sl, imgEl) {
  imgEl.style.position = 'absolute';
  imgEl.style.left = '0'; imgEl.style.top = '0';
  imgEl.style.width = '100%';
  imgEl.style.height = '100%';
  imgEl.style.objectFit = 'cover';
  imgEl.style.objectPosition = `calc(50% + ${sl.ox}px) calc(50% + ${sl.oy}px)`;
  imgEl.style.transformOrigin = 'center center';
  imgEl.style.transform = buildSlotTransform(sl);
  imgEl.style.filter = buildSlotFilter(sl);
  imgEl.style.backfaceVisibility = 'hidden';
}

function applySlotTransformLive(i) {
  const slotEl = document.querySelector(`.slot[data-idx="${i}"]`);
  if(!slotEl) return;
  const img = slotEl.querySelector('img');
  const sl = S.slots[i];
  if(img) {
    img.style.objectPosition = `calc(50% + ${sl.ox}px) calc(50% + ${sl.oy}px)`;
    img.style.transform = buildSlotTransform(sl);
  }
}

function flipSlot(axis) {
  if(S.selectedSlot < 0) return;
  const sl = S.slots[S.selectedSlot];
  if(axis === 'h') sl.flipH = !sl.flipH; else sl.flipV = !sl.flipV;
  applySlotTransformLive(S.selectedSlot);
  refreshOpenPanels();
  pushHistory();
}

function rotateSlot() {
  if(S.selectedSlot < 0) return;
  const sl = S.slots[S.selectedSlot];
  sl.rot = ((sl.rot || 0) + 90) % 360;
  applySlotTransformLive(S.selectedSlot);
  pushHistory();
}

/* ══════════════════════════════════════════
   PRESET (global color grade)
══════════════════════════════════════════ */
function applyPreset() {
  document.querySelectorAll('.slot-inner img').forEach(img => {
    const i = parseInt(img.closest('.slot').dataset.idx);
    const sl = S.slots[i];
    if(!sl || !sl.img) return;
    img.style.filter = buildSlotFilter(sl);
  });
  const board = document.getElementById('board');
  board.style.background = resolveBoardBg();
}

/* ══════════════════════════════════════════
   DESKTOP FLOATING SLOT TOOLBAR
══════════════════════════════════════════ */
let stbTab = 'adjust';

function toolbarBodyHTML(i) {
  const sl = S.slots[i];
  return `
  <div class="stb-tabs" id="stb-tabs">
    ${['adjust','filters','frame','shadow'].map(t=>`<button class="stb-tab${stbTab===t?' on':''}" data-tab="${t}" onclick="setStbTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
  </div>
  <div id="stb-tab-content"></div>
  <div class="stb-actions">
    <button class="stb-btn-clear" onclick="clearSlotPhoto()">Remove</button>
    <button class="stb-btn-replace" onclick="replaceSlotPhoto()">Replace</button>
  </div>`;
}

function setStbTab(t) {
  stbTab = t;
  document.querySelectorAll('#stb-tabs .stb-tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  renderStbTabContent();
}

function renderStbTabContent() {
  const i = S.selectedSlot;
  const sl = S.slots[i];
  const el = document.getElementById('stb-tab-content');
  if(!el || !sl) return;
  if(stbTab === 'adjust') {
    el.innerHTML = `
      <div class="stb-row"><div class="stb-label">Zoom <span>${Math.round(sl.zoom*100)}%</span></div>
        <input class="stb-slider" type="range" min="50" max="300" value="${Math.round(sl.zoom*100)}" oninput="onSlotZoom(this.value)"></div>
      <div class="stb-row"><div class="stb-label">Brightness <span>${sl.br}%</span></div>
        <input class="stb-slider" type="range" min="40" max="180" value="${sl.br}" oninput="onSlotFilter('br',this.value)"></div>
      <div class="stb-row"><div class="stb-label">Contrast <span>${sl.ct}%</span></div>
        <input class="stb-slider" type="range" min="50" max="200" value="${sl.ct}" oninput="onSlotFilter('ct',this.value)"></div>
      <div class="stb-row"><div class="stb-label">Saturation <span>${sl.sat}%</span></div>
        <input class="stb-slider" type="range" min="0" max="200" value="${sl.sat}" oninput="onSlotFilter('sat',this.value)"></div>
      <div class="stb-row"><div class="stb-grid2">
        <button class="stb-mini-btn${sl.flipH?' on':''}" onclick="flipSlot('h')">↔ Flip H</button>
        <button class="stb-mini-btn${sl.flipV?' on':''}" onclick="flipSlot('v')">↕ Flip V</button>
      </div></div>
      <div class="stb-row"><button class="stb-mini-btn" style="width:100%" onclick="rotateSlot()">⟳ Rotate 90°</button></div>`;
  } else if(stbTab === 'filters') {
    el.innerHTML = `<div class="stb-row"><div class="stb-label">Color preset applies globally — pick below in topbar, or quick-pick here</div>
      <div class="swatch-row">${PRESETS.map(p=>`<button class="swatch${S.presetId===p.id?' on':''}" style="background:${PRESET_LIGHT_COLOR[p.id]};box-shadow:0 0 0 1.5px ${PRESET_BORDER[p.id]} inset" title="${p.name}" onclick="setPreset('${p.id}')"></button>`).join('')}</div></div>`;
  } else if(stbTab === 'frame') {
    el.innerHTML = `<div class="stb-row"><div class="stb-label">Frame style</div>
      <div class="stb-grid2">${FRAMES.map(f=>`<button class="stb-mini-btn${S.frameId===f.id?' on':''}" onclick="setFrame('${f.id}')">${f.name}</button>`).join('')}</div></div>`;
  } else if(stbTab === 'shadow') {
    el.innerHTML = `<div class="stb-row"><div class="stb-label">Photo shadow</div>
      <div class="shadow-row">${SHADOWS.map(s=>`<div class="shadow-opt${S.shadowId===s.id?' on':''}" title="${s.name}" onclick="setShadow('${s.id}')"><div class="sw-demo" style="box-shadow:${s.css}"></div></div>`).join('')}</div></div>`;
  }
}

function setPreset(id) {
  S.presetId = id;
  document.querySelectorAll('.preset-dot').forEach((x,i)=>x.classList.toggle('on',PRESETS[i].id===id));
  applyPreset();
  renderStbTabContent();
  pushHistory();
}
function setFrame(id) { S.frameId = id; applyBoard(); renderStbTabContent(); pushHistory(); }
function setShadow(id) { S.shadowId = id; applyBoard(); renderStbTabContent(); pushHistory(); }

function refreshOpenPanels() {
  if(document.getElementById('slot-toolbar').classList.contains('visible')) renderStbTabContent();
  if(document.getElementById('bottom-sheet').classList.contains('open')) renderSheetBody();
}

function openToolbar(i) {
  S.selectedSlot = i;
  const sl = S.slots[i];
  if(!sl || !sl.img) return;

  const tb = document.getElementById('slot-toolbar');
  tb.innerHTML = `<div class="stb-head"><span class="stb-title">Adjust Photo</span><button class="stb-close" onclick="closeToolbar()">✕</button></div>` + toolbarBodyHTML(i);
  renderStbTabContent();
  tb.classList.add('visible');

  const slotEl = document.querySelector(`.slot[data-idx="${i}"]`);
  if(slotEl) {
    document.querySelectorAll('.slot').forEach(x=>x.classList.remove('selected'));
    slotEl.classList.add('selected');
    if(window.innerWidth > 900) {
      const rect = slotEl.getBoundingClientRect();
      const tbW = 300, tbH = 420;
      let left = rect.right + 20, top = rect.top;
      if(left + tbW > window.innerWidth - 20) left = rect.left - tbW - 20;
      if(left < 20) left = 20;
      if(top + tbH > window.innerHeight - 20) top = Math.max(80, window.innerHeight - tbH - 20);
      tb.style.left = left + 'px'; tb.style.top = top + 'px'; tb.style.bottom = 'auto'; tb.style.transform = 'none';
    }
  }
}

function closeToolbar() {
  document.getElementById('slot-toolbar').classList.remove('visible');
  document.querySelectorAll('.slot').forEach(x=>x.classList.remove('selected'));
  S.selectedSlot = -1;
}

function onSlotZoom(v) {
  if(S.selectedSlot < 0) return;
  S.slots[S.selectedSlot].zoom = parseInt(v)/100;
  applySlotTransformLive(S.selectedSlot);
  const labelEl = document.querySelectorAll('.stb-label span')[0];
  if(labelEl) labelEl.textContent = v + '%';
}

function onSlotFilter(prop, v) {
  if(S.selectedSlot < 0) return;
  const map = { br:'br', ct:'ct', sat:'sat' };
  S.slots[S.selectedSlot][map[prop]] = parseInt(v);
  const slotEl = document.querySelector(`.slot[data-idx="${S.selectedSlot}"]`);
  if(slotEl) {
    const img = slotEl.querySelector('img');
    if(img) img.style.filter = buildSlotFilter(S.slots[S.selectedSlot]);
  }
}

function clearSlotPhoto() {
  if(S.selectedSlot < 0) return;
  S.slots[S.selectedSlot] = { dataURL:null, img:null, zoom:1, br:100, ct:100, sat:100, ox:0, oy:0, flipH:false, flipV:false, rot:0 };
  closeToolbar();
  closeSheet();
  applyBoard();
  pushHistory();
}

function replaceSlotPhoto() {
  if(S.selectedSlot < 0) return;
  openFilePickerForSlot(S.selectedSlot);
}

function clearAll() {
  S.slots.forEach(sl => {
    sl.dataURL=null; sl.img=null; sl.zoom=1; sl.br=100; sl.ct=100; sl.sat=100; sl.ox=0; sl.oy=0; sl.flipH=false; sl.flipV=false; sl.rot=0;
  });
  S.layers = [];
  closeToolbar();
  closeSheet();
  applyBoard();
  toast('🗑️ Canvas cleared');
  pushHistory();
}

/* ══════════════════════════════════════════
   MOBILE DOCK (CapCut style bottom icon bar)
══════════════════════════════════════════ */
const DOCK_ITEMS = [
  { id:'layout', label:'Layout', icon:'layout' },
  { id:'background', label:'Background', icon:'bg' },
  { id:'adjust', label:'Adjust', icon:'adjust' },
  { id:'filters', label:'Filters', icon:'filters' },
  { id:'frame', label:'Frame', icon:'frame' },
  { id:'shadow', label:'Shadow', icon:'shadow' },
  { id:'text', label:'Text', icon:'text' },
  { id:'sticker', label:'Sticker', icon:'sticker' },
  { id:'flip', label:'Flip/Rotate', icon:'flip' },
  { id:'size', label:'Size', icon:'size' },
  { id:'gap', label:'Spacing', icon:'gap' },
  { id:'clear', label:'Clear', icon:'clear' },
];

function buildDock() {
  const el = document.getElementById('dock-scroll');
  el.innerHTML = '';
  DOCK_ITEMS.forEach(d => {
    const b = document.createElement('button');
    b.className = 'dock-item';
    b.dataset.id = d.id;
    b.innerHTML = `<span class="di-icn">${ICN[d.icon]}</span><span class="di-lbl">${d.label}</span>`;
    b.onclick = () => onDockTap(d.id);
    el.appendChild(b);
  });
}

function onDockTap(id) {
  if(id === 'clear') { clearAll(); return; }
  if((id==='adjust'||id==='filters'||id==='frame'||id==='shadow'||id==='flip') && S.selectedSlot < 0) {
    // Auto-select first filled slot, or prompt to add a photo
    const firstFilled = S.slots.findIndex(s=>s.img);
    if(firstFilled === -1) { toast('📸 Add a photo to a slot first'); return; }
    S.selectedSlot = firstFilled;
    applyBoard();
  }
  openSheet(id);
}

function openSheet(id) {
  document.querySelectorAll('.dock-item').forEach(b=>b.classList.toggle('on', b.dataset.id===id));
  document.getElementById('sheet-title').textContent = DOCK_ITEMS.find(d=>d.id===id)?.label || '';
  currentSheet = id;
  renderSheetBody();
  document.getElementById('sheet-bg').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
}

let currentSheet = null;

function closeSheet() {
  document.getElementById('sheet-bg').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
  document.querySelectorAll('.dock-item').forEach(b=>b.classList.remove('on'));
  currentSheet = null;
}

function renderSheetBody() {
  const body = document.getElementById('sheet-body');
  if(!currentSheet) return;
  const i = S.selectedSlot;
  const sl = i >= 0 ? S.slots[i] : null;

  if(currentSheet === 'adjust') {
    if(!sl || !sl.img) { body.innerHTML = `<p style="color:var(--muted);font-size:.8rem;padding:20px 0;text-align:center">Select a photo slot to adjust</p>`; return; }
    body.innerHTML = `
      <div class="stb-row"><div class="stb-label">Zoom <span>${Math.round(sl.zoom*100)}%</span></div>

function renderLayers() {
  const board = document.getElementById('board');
  board.querySelectorAll('.layer').forEach(el => el.remove());
  S.layers.forEach(l => {
    const el = document.createElement('div');
    el.className = 'layer' + (S.selectedLayer === l.id ? ' selected' : '');
    el.dataset.id = l.id;
    el.style.left = (l.x * S.zoomLevel) + 'px';
    el.style.top = (l.y * S.zoomLevel) + 'px';
    el.style.transform = `rotate(${l.rot||0}deg)`;
    if(l.type === 'text') {
      el.classList.add('layer-text');
      const fontCss = TEXT_FONTS.find(f=>f.id===l.font)?.css || TEXT_FONTS[0].css;
      el.style.fontFamily = fontCss;
      el.style.color = l.color;
      el.style.fontSize = (l.size * S.zoomLevel) + 'px';
      el.textContent = l.value;
    } else {
      el.style.fontSize = (l.size * S.zoomLevel) + 'px';
      el.style.lineHeight = '1';
      el.textContent = l.value;
    }
    if(S.selectedLayer === l.id) {
      const del = document.createElement('div');
      del.className = 'layer-del';
      del.innerHTML = '✕';
      del.onclick = (e) => { e.stopPropagation(); deleteLayer(l.id); };
      el.appendChild(del);
      const rs = document.createElement('div');
      rs.className = 'layer-resize';
      rs.dataset.role = 'resize';
      el.appendChild(rs);
    }
    board.appendChild(el);
  });
}

function selectLayer(id) {

function deleteLayer(id) {
  S.layers = S.layers.filter(l=>l.id !== id);
  S.selectedLayer = -1;
  renderLayers();
  if(currentSheet === 'text' || currentSheet === 'sticker') renderSheetBody();
  pushHistory();
}

function initLayerDrag() {
  let info = null;
  document.addEventListener('mousedown', start);
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', end);
  document.addEventListener('touchstart', start, {passive:false});
  document.addEventListener('touchmove', move, {passive:false});
  document.addEventListener('touchend', end);

  function start(e) {
    const resizeHandle = e.target.closest('.layer-resize');
    const layerEl = e.target.closest('.layer');
    if(!layerEl) return;
    const id = parseInt(layerEl.dataset.id);
    if(S.selectedLayer !== id) { selectLayer(id); }
    const l = S.layers.find(x=>x.id===id);
    if(!l) return;
    const clientX = e.type==='touchstart' ? e.touches[0].clientX : e.clientX;
    const clientY = e.type==='touchstart' ? e.touches[0].clientY : e.clientY;
    if(resizeHandle) {
      info = { mode:'resize', id, startX:clientX, startY:clientY, startSize:l.size };
    } else if(e.target.closest('.layer-del')) {
      return;
    } else {
      info = { mode:'move', id, startX:clientX, startY:clientY, startLX:l.x, startLY:l.y };
      layerEl.classList.add('dragging');
    }
    e.stopPropagation();
  }
  function move(e) {
    if(!info) return;
    e.preventDefault();
    const clientX = e.type==='touchmove' ? e.touches[0].clientX : e.clientX;
    const clientY = e.type==='touchmove' ? e.touches[0].clientY : e.clientY;
    const l = S.layers.find(x=>x.id===info.id);
    if(!l) return;
    if(info.mode === 'move') {
      l.x = info.startLX + (clientX - info.startX) / S.zoomLevel;
      l.y = info.startLY + (clientY - info.startY) / S.zoomLevel;
      const el = document.querySelector(`.layer[data-id="${info.id}"]`);
      if(el) { el.style.left = (l.x*S.zoomLevel)+'px'; el.style.top = (l.y*S.zoomLevel)+'px'; }
    } else if(info.mode === 'resize') {
      const delta = (clientX - info.startX);
      l.size = Math.max(10, Math.min(200, info.startSize + delta * 0.5));
      const el = document.querySelector(`.layer[data-id="${info.id}"]`);
      if(el) el.style.fontSize = (l.size*S.zoomLevel)+'px';
    }
  }
  function end() {
    if(info) {
      const el = document.querySelector(`.layer[data-id="${info.id}"]`);
      if(el) el.classList.remove('dragging');
      info = null;
      pushHistory();
    }
  }
}

function fitZoom() {
  const ws = document.getElementById('workspace');
  const sz = SIZES.find(x=>x.id===S.sizeId);
  const isMobile = window.innerWidth <= 900;
  const padW = isMobile ? 32 : 100;
  const padH = isMobile ? 60 : 100;
  S.zoomLevel = Math.min((ws.clientWidth-padW)/sz.w, (ws.clientHeight-padH)/sz.h, 1);
  document.getElementById('zoom-pct').textContent = Math.round(S.zoomLevel*100) + '%';
  applyBoard();
}

async function doExport() {
  const dlBtn = document.getElementById('export-dl-btn');
  dlBtn.innerHTML = '<span class="spin"></span> Rendering...';
  dlBtn.disabled = true;
  toast('⏳ Rendering your collage...');

  // Defer to allow UI update
  await new Promise(r => setTimeout(r, 60));

  try {
    const scaleFactor = S.exportScale;
    const sz = SIZES.find(x=>x.id===S.sizeId);
    const W = sz.w * scaleFactor, H = sz.h * scaleFactor;
    const gap = S.gap * scaleFactor;
    const cols = S.cols, rows = S.rows;
    const totalGapW = gap * (cols - 1);
    const totalGapH = gap * (rows - 1);
    const cellW = (W - totalGapW) / cols;
    const cellH = (H - totalGapH) / rows;

    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Board background
    ctx.fillStyle = resolveBoardBg();
    ctx.fillRect(0,0,W,H);

    const frame = FRAMES.find(x=>x.id===S.frameId);
    const shadow = SHADOWS.find(x=>x.id===S.shadowId);
    const preset = PRESETS.find(x=>x.id===S.presetId);

    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const i = r*cols+c;
        const sl = S.slots[i];
        let x = c*(cellW+gap), y = r*(cellH+gap);
        let cw = cellW, ch = cellH;

        // shrink for border frames so border is visible inside cell
        let bw = frame.id === 'polaroid' ? 10*scaleFactor : (frame.border>0 ? frame.border*scaleFactor : 0);
        let bwBottom = frame.id === 'polaroid' ? 34*scaleFactor : bw;

        if(sl && sl.img && shadow.id !== 'none') {
          ctx.save();
          applyCanvasShadow(ctx, shadow.id, scaleFactor);
          ctx.fillStyle = frame.color || '#ffffff';
          roundRect(ctx, x, y, cw, ch, (frame.radius||0)*scaleFactor);
          ctx.fill();
          ctx.restore();
        }

        ctx.save();
        roundRect(ctx, x, y, cw, ch, (frame.radius||0)*scaleFactor);
        ctx.clip();

        if(frame.color || frame.id==='polaroid') {
          ctx.fillStyle = frame.color || '#ffffff';
          ctx.fillRect(x,y,cw,ch);
        }

        const ix = x + bw, iy = y + bw, iw = cw - bw*2, ih = ch - bw - bwBottom;

        ctx.save();
        roundRect(ctx, ix, iy, Math.max(0,iw), Math.max(0,ih), Math.max(0,(frame.radius||0)-bw)*scaleFactor);
        ctx.clip();

        if(sl && sl.img) {
          const base = `brightness(${sl.br}%) contrast(${sl.ct}%) saturate(${sl.sat}%)`;
          ctx.filter = preset.filter ? base+' '+preset.filter : base;

          const img = sl.img;
          const flipX = sl.flipH ? -1 : 1;
          const flipY = sl.flipV ? -1 : 1;
          const rot = (sl.rot||0) * Math.PI/180;

          ctx.translate(ix + iw/2, iy + ih/2);
          ctx.rotate(rot);
          ctx.scale(sl.zoom*flipX, sl.zoom*flipY);

          const coverScale = Math.max(iw/img.width, ih/img.height);
          const cwid = img.width*coverScale, chei = img.height*coverScale;
          ctx.drawImage(img, -cwid/2 + sl.ox*scaleFactor, -chei/2 + sl.oy*scaleFactor, cwid, chei);
          ctx.filter = 'none';
        } else {
          ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--slot-empty-bg').trim() || '#F1F5F9';
          ctx.fillRect(ix,iy,iw,ih);
        }
        ctx.restore(); // inner clip
        ctx.restore(); // outer clip
      }
    }

    // Draw text & sticker layers on top
    S.layers.forEach(l => {
      ctx.save();
      const lx = l.x*scaleFactor, ly = l.y*scaleFactor;
      ctx.translate(lx, ly);
      ctx.rotate((l.rot||0)*Math.PI/180);
      if(l.type === 'text') {
        const fontCss = TEXT_FONTS.find(f=>f.id===l.font)?.css || TEXT_FONTS[0].css;
        ctx.font = `700 ${l.size*scaleFactor}px ${fontCss}`;
        ctx.fillStyle = l.color;
        ctx.textBaseline = 'top';
        ctx.fillText(l.value, 0, 0);
      } else {
        ctx.font = `${l.size*scaleFactor}px sans-serif`;
        ctx.textBaseline = 'top';
        ctx.fillText(l.value, 0, 0);
      }
      ctx.restore();
    });

    const mime = S.exportFmt === 'jpeg' ? 'image/jpeg' : 'image/png';
    const qSlider = document.getElementById('quality-slider');
    const quality = S.exportFmt === 'jpeg' ? (parseInt(qSlider.value)/100) : undefined;
    const dataURL = quality !== undefined ? canvas.toDataURL(mime, quality) : canvas.toDataURL(mime);

    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    a.download = `CollageCraft-${date}.${S.exportFmt}`;
    a.href = dataURL;
    a.click();

    closeExport();
    toast('✨ Collage downloaded successfully!');
  } catch(err) {
    console.error(err);
    toast('⚠️ Export failed — try a smaller scale');
  } finally {
    dlBtn.innerHTML = 'Download Now';
    dlBtn.disabled = false;
  }
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.max(0, Math.min(r, Math.min(w,h)/2));
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function applyCanvasShadow(ctx, shadowId, scale) {
  if(shadowId === 'soft') { ctx.shadowColor='rgba(0,0,0,.25)'; ctx.shadowBlur=24*scale; ctx.shadowOffsetY=8*scale; }
  else if(shadowId === 'lift') { ctx.shadowColor='rgba(0,0,0,.38)'; ctx.shadowBlur=40*scale; ctx.shadowOffsetY=18*scale; }
  else if(shadowId === 'glow') { ctx.shadowColor='rgba(124,122,255,.45)'; ctx.shadowBlur=30*scale; }
  else if(shadowId === 'hard') { ctx.shadowColor='rgba(0,0,0,.85)'; ctx.shadowOffsetX=10*scale; ctx.shadowOffsetY=10*scale; }
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3200);
}

/* ══════════════════════════════════════════
   KEYBOARD & GLOBAL CLICKS
══════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if(e.key==='Escape') { closeToolbar(); closeExport(); closeSheet(); deselectLayers(); }
  if((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); openExport(); }
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) { e.preventDefault(); undo(); }
  if((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z'&&e.shiftKey))) { e.preventDefault(); redo(); }
  if(e.key==='+' || (e.key==='='&&e.ctrlKey)) { e.preventDefault(); zoom(0.1); }
  if(e.key==='-' && e.ctrlKey) { e.preventDefault(); zoom(-0.1); }
  if(e.key==='0' && e.ctrlKey) { e.preventDefault(); fitZoom(); }
  if((e.key==='Delete'||e.key==='Backspace') && S.selectedLayer !== -1 && document.activeElement.tagName!=='INPUT') { deleteLayer(S.selectedLayer); }
});

document.addEventListener('mousedown', e => {
  const tb = document.getElementById('slot-toolbar');
  if(!tb.contains(e.target) && !e.target.closest('.slot') && !e.target.closest('.topbar') && !e.target.closest('.layer')) closeToolbar();
  if(!e.target.closest('.layer') && !e.target.closest('#slot-toolbar') && !e.target.closest('.bottom-sheet')) deselectLayers();
});
document.addEventListener('touchstart', e => {
  const tb = document.getElementById('slot-toolbar');
  if(!tb.contains(e.target) && !e.target.closest('.slot') && !e.target.closest('.topbar') && !e.target.closest('.layer')) closeToolbar();
});

window.addEventListener('resize', () => { if(window.innerWidth > 900) fitZoom(); });

/* ══════════════════════════════════════════
   GO
══════════════════════════════════════════ */
init();
</script>
